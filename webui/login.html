<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - AMI Medical Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f7fb;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 400px;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      background: #fff;
    }
    .brand-logo {
      height: 80px;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <img src="/branding/logo.png" alt="Logo" class="brand-logo">
    <h4 class="fw-bold mb-4">AMI Medical Center</h4>
    <form id="loginForm">
      <div class="mb-3 text-start">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" required placeholder="Enter username">
      </div>
      <div class="mb-4 text-start">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required placeholder="Enter password">
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login</button>
    </form>
    <div id="errorMsg" class="text-danger small mt-3" style="display:none"></div>
  </div>

  <script>
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');
      
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username: u, password: p})
        });
        
        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('username', data.username);
          localStorage.setItem('rights', JSON.stringify(data.rights));
          window.location.href = 'index.html';
        } else {
          const err = await res.json();
          errorEl.textContent = err.detail || 'Login failed';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Connection error';
        errorEl.style.display = 'block';
      }
    };
  </script>
</body>
</html>
