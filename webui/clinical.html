    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Clinical Management</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
      <style>
        body{background:linear-gradient(180deg,#eef5ff,#f7fbff);}
        .pr-card{border:none;border-radius:18px;box-shadow:0 18px 40px rgba(31,75,138,.12)}
        .pr-header{background:linear-gradient(135deg,#1b68e5,#39a0ff);color:#fff;border-top-left-radius:18px;border-top-right-radius:18px;padding:18px 22px}
        .pr-sub{opacity:.9;font-size:.95rem}
        .pr-body{padding:22px}
        .required::after{content:" *";color:#e74c3c}
        .pill .form-control,.pill .form-select{border-radius:12px}
        .icon-box{width:42px;display:flex;align-items:center;justify-content:center;color:#1f4b8a}
        .btn-primary{background:#1f6feb;border-color:#1f6feb}
        .btn-primary:hover{background:#175bd0;border-color:#175bd0}
        .btn-outline-secondary{border-color:#d7e1ee;color:#2d557d}
        .btn-outline-secondary:hover{background:#f2f6fb}
        .hero{min-height:100%;display:flex;align-items:center;justify-content:center}
        .hero-blob{width:100%;max-width:340px;border-radius:28px;background: #fff;display:flex;align-items:center;justify-content:center; box-shadow: 0 10px 30px rgba(31,75,138,.1); padding: 20px;}
        .hero-emoji{font-size:92px}
        .toolbar{display:flex;gap:12px;justify-content:end}
        .form-section-title{font-weight:700;color:#244a7c;margin:0 0 6px 0}
        .quickbox{background:#f1f6ff;border:1px solid #d8e6ff;padding:14px;border-radius:12px;box-shadow:0 6px 16px rgba(31,75,138,.08)}
        .hidden{display:none}
      </style>
    </head>
    <body>
      <nav class="navbar navbar-expand-lg bg-white border-bottom mb-4">
        <div class="container-fluid">
          <a class="navbar-brand d-flex align-items-center fw-bold text-primary" href="index.html">
            <img src="/branding/logo.png" alt="Logo" class="me-2" style="height: 40px;">
            AMI Medical Center
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link" href="index.html">🏠 Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="patient.html">📝 Registration</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="clinical.html">🧑‍⚕️ Clinical</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="invoice.html">🧾 Billing</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="search.html">🔍 Search</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="reports.html">📊 Reports</a>
              </li>
            </ul>
            <div class="dropdown me-3">
              <button class="btn btn-light dropdown-toggle btn-sm fw-bold text-primary" type="button" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle"></i> <span id="userDisplay">User</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                <li><a class="dropdown-item py-2" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
              </ul>
            </div>
            <span class="navbar-text d-none d-lg-inline">"Your Health, Our Commitment."</span>
          </div>
        </div>
      </nav>
      <div class="container">
        <div class="pr-card">
          <div class="pr-header">
            <div class="h4 mb-1">Clinical Management</div>
            <div class="pr-sub">Patient Clinical Record</div>
          </div>
          <div class="pr-body">
            <div class="row">
              <div class="col-md-4">
                <h5>Doctor List</h5>
                <div id="doctorList" class="list-group"></div>
              </div>
              <div class="col-md-8">
                <h5>Doctor Details</h5>
                <form id="doctorForm">
                  <input type="hidden" id="doctorId">
                  <div class="mb-3">
                    <label for="doctorName" class="form-label">Name</label>
                    <input type="text" class="form-control" id="doctorName" required>
                  </div>
                  <div class="mb-3">
                    <label for="doctorFee" class="form-label">Fee</label>
                    <input type="number" class="form-control" id="doctorFee" required>
                  </div>
                  <div class="mb-3">
                    <label for="doctorSpecialty" class="form-label">Specialty</label>
                    <input type="text" class="form-control" id="doctorSpecialty" required>
                  </div>
                  <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Doctor</button>
                    <button type="button" class="btn btn-danger hidden" id="deleteDoctor">Delete</button>
                    <button type="button" class="btn btn-secondary" id="clearForm">Clear</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const api = (p, opt={}) => fetch(p, opt).then(r => r.ok ? r.json() : r.json().then(j=>{throw new Error(j.detail || 'Error')}));
      
      function logout() {
        localStorage.removeItem('username');
        localStorage.removeItem('rights');
        window.location.href = 'login.html';
      }

      const username = localStorage.getItem('username');
      if (!username) {
        window.location.href = 'login.html';
      }

      async function loadDoctors() {
        document.getElementById('userDisplay').textContent = username;
        try {
          const doctorList = document.getElementById('doctorList');
          doctorList.innerHTML = '';
          const doctors = await api('/lookups/doctors-with-fee');
          doctors.forEach(doctor => {
            const a = document.createElement('a');
            a.href = '#';
            a.className = 'list-group-item list-group-item-action';
            a.innerHTML = `
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <strong>${doctor.name}</strong><br>
                  <small class="text-muted">${doctor.specialty || 'General'}</small>
                </div>
                <span class="badge bg-primary rounded-pill">Fee: ${doctor.fee}</span>
              </div>
            `;
            a.onclick = (e) => {
              e.preventDefault();
              document.getElementById('doctorId').value = doctor._id;
              document.getElementById('doctorName').value = doctor.name;
              document.getElementById('doctorFee').value = doctor.fee;
              document.getElementById('doctorSpecialty').value = doctor.specialty || '';
              document.getElementById('deleteDoctor').classList.remove('hidden');
            };
            doctorList.appendChild(a);
          });
        } catch (err) {
          console.error(err);
        }
      }

      document.getElementById('doctorForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const doctorId = document.getElementById('doctorId').value;
          const name = document.getElementById('doctorName').value;
          const fee = document.getElementById('doctorFee').value;
          const specialty = document.getElementById('doctorSpecialty').value;
          const payload = { name, fee: parseFloat(fee), specialty };
          try {
            if (doctorId) {
              await api(`/doctors/${doctorId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              alert('Doctor updated successfully');
            } else {
              await api('/doctors', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              alert('Doctor added successfully');
            }
            resetForm();
            loadDoctors();
          } catch(err) { alert(err.message); }
        });

        document.getElementById('deleteDoctor').addEventListener('click', async () => {
          const doctorId = document.getElementById('doctorId').value;
          if (!doctorId) return;
          if (!confirm('Are you sure you want to delete this doctor?')) return;
          try {
            await api(`/doctors/${doctorId}`, { method: 'DELETE' });
            alert('Doctor deleted successfully');
            resetForm();
            loadDoctors();
          } catch(err) { alert(err.message); }
        });

        function resetForm() {
          document.getElementById('doctorForm').reset();
          document.getElementById('doctorId').value = '';
          document.getElementById('deleteDoctor').classList.add('hidden');
        }

        document.getElementById('clearForm').addEventListener('click', resetForm);

        loadDoctors();
      </script>
    </body>
    </html>
