<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search Patients</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f4f7fb}
    .card{border:none;box-shadow:0 12px 28px rgba(31,75,138,.12)}
    .pill .form-control,.pill .form-select{border-radius:12px}
    .table-hover tbody tr{cursor:pointer}
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center fw-bold text-primary" href="index.html">
        <img src="/branding/logo.png" alt="Logo" class="me-2" style="height: 40px;">
        AMI Medical Center
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">🏠 Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="patient.html">📝 Registration</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="clinical.html">🧑‍⚕️ Clinical</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="invoice.html">🧾 Billing</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="search.html">🔍 Search</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="reports.html">📊 Reports</a>
          </li>
        </ul>
        <div class="dropdown me-3">
          <button class="btn btn-light dropdown-toggle btn-sm fw-bold text-primary" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i> <span id="userDisplay">User</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
            <li><a class="dropdown-item py-2" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
          </ul>
        </div>
        <span class="navbar-text d-none d-lg-inline">"Your Health, Our Commitment."</span>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div class="card">
      <div class="card-body">
        <div class="row g-3 align-items-end pill">
          <div class="col-md-2">
            <label class="form-label">Search By</label>
            <select id="mode" class="form-select">
              <option>Mobile</option>
              <option>Registration</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Query</label>
            <input id="query" class="form-control" type="text" placeholder="Enter mobile or registration no">
          </div>
          <div class="col-md-2">
            <button id="btnSearch" class="btn btn-primary w-100">Search</button>
          </div>
        </div>
        <div class="table-responsive mt-4">
          <table class="table table-hover table-sm align-middle">
            <thead class="table-light">
              <tr><th>Reg No</th><th>Name</th><th>Mobile</th></tr>
            </thead>
            <tbody id="results"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const api = (p, opt={}) => fetch(p, opt).then(r => r.ok ? r.json() : r.json().then(j=>{throw new Error(j.detail || 'Error')}));
    
    function logout() {
      localStorage.removeItem('username');
      localStorage.removeItem('rights');
      window.location.href = 'login.html';
    }

    const username = localStorage.getItem('username');
    if (!username) {
      window.location.href = 'login.html';
    }

    async function doSearch(){
      const mode = document.getElementById('mode').value;
      const q = document.getElementById('query').value.trim();
      const tb = document.getElementById('results'); tb.innerHTML='';
      if(!q) return;
      let url = '/patients?' + (mode === 'Mobile' ? 'mobile=' : 'reg_no=') + encodeURIComponent(q);
      try{
        const rows = await api(url);
        rows.forEach(r => {
          const tr = document.createElement('tr');
          const fullName = [r.title, r.first_name, r.middle_name, r.last_name].filter(Boolean).join(' ');
          tr.innerHTML = `<td>${r.reg_no||''}</td><td>${fullName}</td><td>${r.contact_number||''}</td>`;
          tr.addEventListener('click', () => {
            const params = new URLSearchParams(); params.set('reg_no', r.reg_no||'');
            window.location.href = 'patient.html?' + params.toString();
          });
          tb.appendChild(tr);
        });
      }catch(e){ alert('Error: ' + e.message); }
    }
    document.getElementById('btnSearch').onclick = doSearch;
    document.getElementById('query').onkeydown = (e) => { if(e.key === 'Enter') doSearch(); };
    
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('userDisplay').textContent = username;
    });
  </script>
</body>
</html>
